name: personal-finance-tracker

services:
  postgres:
    image: postgres:16-alpine
    container_name: pft-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finance_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-finance_tracker}"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pft-backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      UseHttpsRedirection: ${USE_HTTPS_REDIRECTION:-false}
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=${POSTGRES_DB:-finance_tracker};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Jwt__Issuer: ${JWT_ISSUER:-FinanceTracker.Api}
      Jwt__Audience: ${JWT_AUDIENCE:-FinanceTracker.Frontend}
      Jwt__Key: ${JWT_KEY:-CHANGE_THIS_TO_A_LONG_SECURE_KEY_FOR_PRODUCTION_32CHARS_MIN}
      Jwt__AccessTokenMinutes: ${JWT_ACCESS_TOKEN_MINUTES:-30}
      Jwt__RefreshTokenDays: ${JWT_REFRESH_TOKEN_DAYS:-14}
      Cors__AllowedOrigins__0: ${CORS_ORIGIN_1:-http://localhost:4173}
      Cors__AllowedOrigins__1: ${CORS_ORIGIN_2:-http://localhost:5173}
    depends_on:
      - postgres
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    container_name: pft-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4173:80"

volumes:
  pgdata:
